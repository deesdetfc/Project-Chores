<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaning Routines — Shared</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem 3rem; }

  #room-screen { max-width: 400px; margin: 4rem auto; text-align: center; }
  #room-screen h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.4rem; }
  #room-screen p { color: #6b7280; font-size: 0.9rem; margin-bottom: 2rem; }
  .room-box { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .room-box h2 { font-size: 1rem; font-weight: 500; margin-bottom: 1rem; color: #374151; }
  .room-input-row { display: flex; gap: 8px; }
  .room-input-row input { flex: 1; padding: 9px 12px; font-size: 14px; border-radius: 8px; border: 1px solid #d1d5db; font-family: inherit; }
  .room-input-row button { padding: 9px 16px; font-size: 14px; border-radius: 8px; border: none; background: #374151; color: #fff; cursor: pointer; font-family: inherit; }
  .or-divider { color: #9ca3af; font-size: 13px; margin: 1rem 0; }
  .name-input { width: 100%; padding: 9px 12px; font-size: 14px; border-radius: 8px; border: 1px solid #d1d5db; font-family: inherit; margin-bottom: 10px; }
  .join-btn { width: 100%; padding: 10px; font-size: 14px; border-radius: 8px; border: none; background: #374151; color: #fff; cursor: pointer; font-family: inherit; font-weight: 500; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; min-height: 18px; }

  #app { max-width: 680px; margin: 0 auto; display: none; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  .top-bar h1 { font-size: 1.4rem; font-weight: 600; }
  .room-badge { background: #1f2937; color: #fff; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
  .room-badge span { opacity: 0.6; font-weight: 400; }
  .online-dots { display: flex; gap: 5px; align-items: center; font-size: 12px; color: #6b7280; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1.5px solid #ddd; background: transparent; font-size: 13px; cursor: pointer; font-family: inherit; color: #444; transition: all 0.15s; }
  .tab.active { border-color: #374151; background: #fff; font-weight: 500; color: #111; }

  .section { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 14px; margin-bottom: 1rem; }
  .section-label { font-size: 11px; color: #9ca3af; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

  .people-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  .person-pill { display: flex; align-items: center; gap: 6px; border-radius: 20px; padding: 4px 10px 4px 7px; font-size: 13px; }
  .person-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .remove-btn { background: none; border: none; cursor: pointer; font-size: 16px; line-height: 1; padding: 0; opacity: 0.55; }

  .add-row { display: flex; gap: 6px; }
  .add-row input, .add-row select { flex: 1; padding: 6px 10px; font-size: 13px; border-radius: 6px; border: 1px solid #d1d5db; font-family: inherit; background: #fafafa; }
  .add-row select { flex: 0 0 auto; width: auto; }
  .btn { padding: 6px 12px; font-size: 13px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn:hover { background: #f3f4f6; }
  .btn-dark { background: #374151; color: #fff; border-color: #374151; }
  .btn-dark:hover { background: #1f2937; }
  .btn-sm { padding: 4px 9px; font-size: 12px; border-radius: 5px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-family: inherit; }
  .btn-sm:hover { background: #f3f4f6; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 11px; color: #9ca3af; margin-bottom: 2px; }
  .stat-val { font-size: 22px; font-weight: 500; }

  .columns { display: grid; gap: 10px; margin-bottom: 1rem; }
  .person-col { background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; }
  .col-header { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
  .col-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .col-name { font-size: 13px; font-weight: 500; }
  .col-progress { font-size: 11px; opacity: 0.7; }
  .col-body { padding: 8px 6px; min-height: 60px; }
  .empty-col { font-size: 12px; color: #9ca3af; text-align: center; padding: 1rem 0; }

  .task-item { display: flex; align-items: flex-start; gap: 7px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
  .task-item:hover { background: #f9fafb; }
  .task-item.done { opacity: 0.4; }
  .checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #d1d5db; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .checkbox.checked { border-color: transparent; }
  .check-inner { display: none; }
  .checkbox.checked .check-inner { display: block; }
  .task-text { font-size: 12px; line-height: 1.4; }
  .task-done-text { text-decoration: line-through; }
  .task-room { font-size: 10px; color: #9ca3af; margin-top: 1px; }

  .task-list-edit { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .task-edit-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 7px; border: 1px solid #e5e7eb; background: #fafafa; }
  .task-edit-row .room-icon { font-size: 14px; flex-shrink: 0; }
  .task-edit-row input { flex: 1; border: none; background: transparent; font-size: 13px; font-family: inherit; color: #1a1a1a; outline: none; min-width: 0; }
  .task-edit-row select { font-size: 12px; border: 1px solid #e5e7eb; border-radius: 4px; background: #fff; font-family: inherit; padding: 2px 4px; color: #374151; }
  .task-edit-row .del-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; color: #d1d5db; flex-shrink: 0; line-height: 1; }
  .task-edit-row .del-btn:hover { color: #ef4444; background: #fef2f2; }
  .static-task-label { flex: 1; font-size: 13px; color: #374151; }

  .unassigned-section { border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; margin-bottom: 1rem; }
  .unassigned-header { background: #f9fafb; padding: 10px 14px; border-bottom: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; font-weight: 500; }
  .unassigned-item { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
  .unassigned-item:last-child { border-bottom: none; }
  .unassigned-task { font-size: 12px; color: #374151; margin-bottom: 5px; }
  .assign-btns { display: flex; flex-wrap: wrap; gap: 5px; }
  .assign-btn { font-size: 11px; padding: 3px 9px; border-radius: 12px; border: 1px solid; cursor: pointer; font-family: inherit; }
  .assign-btn:hover { opacity: 0.75; }

  .reset-btn { width: 100%; padding: 9px; font-size: 12px; border-radius: 8px; border: 1.5px dashed #d1d5db; background: transparent; color: #9ca3af; cursor: pointer; font-family: inherit; margin-bottom: 8px; }
  .reset-btn:hover { background: #f9fafb; }
  .syncing { font-size: 11px; color: #9ca3af; text-align: center; padding: 4px; min-height: 20px; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; font-size: 13px; padding: 9px 18px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="room-screen">
  <h1>🧹 Cleaning Routines</h1>
  <p>Create a room to share chores with your household,<br>or join an existing one with a code.</p>
  <div class="room-box">
    <h2>Join a room</h2>
    <input class="name-input" id="join-name" placeholder="Your name (e.g. Alex)" maxlength="20" />
    <div class="room-input-row">
      <input id="join-code" placeholder="Room code (e.g. BLUE-42)" maxlength="12" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()" />
      <button onclick="joinRoom()">Join</button>
    </div>
    <div class="error-msg" id="join-error"></div>
  </div>
  <div class="or-divider">— or —</div>
  <div class="room-box">
    <h2>Create a new room</h2>
    <input class="name-input" id="create-name" placeholder="Your name (e.g. Alex)" maxlength="20" />
    <button class="join-btn" onclick="createRoom()">Create room</button>
    <div class="error-msg" id="create-error"></div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div>
      <h1>Cleaning Routines</h1>
      <div style="font-size:0.8rem;color:#6b7280;margin-top:2px">4+ bedroom home</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <div class="room-badge" onclick="copyRoomCode()" title="Tap to copy">
        <span>Room: </span><span id="room-code-display"></span>
      </div>
      <div class="online-dots" id="online-display"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('daily')">Daily <span style="font-weight:400;font-size:11px;color:#9ca3af">~30 min</span></button>
    <button class="tab" onclick="setTab('weekly')">Weekly <span style="font-weight:400;font-size:11px;color:#9ca3af">~3–4 hrs</span></button>
    <button class="tab" onclick="setTab('monthly')">Monthly <span style="font-weight:400;font-size:11px;color:#9ca3af">~4–6 hrs</span></button>
  </div>

  <div class="section">
    <div class="section-label">Household members</div>
    <div class="people-wrap" id="people-wrap"></div>
    <div class="add-row">
      <input id="new-person-input" placeholder="Add person..." maxlength="20" onkeydown="if(event.key==='Enter')addPerson()" />
      <button class="btn" onclick="addPerson()">Add</button>
      <button class="btn btn-dark" onclick="autoSplit()">Auto-split</button>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-label" style="margin-bottom:0">Tasks</div>
      <button class="btn-sm" id="edit-toggle-btn" onclick="toggleEditMode()">✏️ Edit tasks</button>
    </div>
    <div id="task-editor"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total tasks</div><div class="stat-val" id="stat-total">0</div></div>
    <div class="stat"><div class="stat-label">Assigned</div><div class="stat-val" id="stat-assigned">0</div></div>
    <div class="stat"><div class="stat-label">Done</div><div class="stat-val" id="stat-done">0</div></div>
  </div>

  <div class="columns" id="columns"></div>
  <div id="unassigned-section"></div>
  <button class="reset-btn" onclick="clearTab()">↺ Clear all assignments &amp; checks for this tab</button>
  <div class="syncing" id="syncing-status"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBKudytw8axt_gU7v6Tm8Sltz0mOMd7sxc",
  authDomain: "project-chores.firebaseapp.com",
  databaseURL: "https://project-chores-default-rtdb.firebaseio.com",
  projectId: "project-chores",
  storageBucket: "project-chores.firebasestorage.app",
  messagingSenderId: "521306371321",
  appId: "1:521306371321:web:92812f81298cc89c849e28"
});
const db = firebase.database();

const DEFAULT_TASKS = {
  daily: [
    {id:"d1",room:"Kitchen",task:"Wipe counters, stovetop & sink"},
    {id:"d2",room:"Kitchen",task:"Load/unload dishwasher"},
    {id:"d3",room:"Kitchen",task:"Sweep kitchen floor"},
    {id:"d4",room:"Bathrooms",task:"Quick wipe of all toilet seats & handles"},
    {id:"d5",room:"Bathrooms",task:"Rinse sinks in used bathrooms"},
    {id:"d6",room:"Bedrooms",task:"Make all beds"},
    {id:"d7",room:"Living",task:"Tidy main living areas & fluff cushions"},
    {id:"d8",room:"Entryway",task:"Clear shoes, bags & clutter at entry"},
    {id:"d9",room:"General",task:"Take out kitchen trash if full"},
    {id:"d10",room:"General",task:"10-min evening tidy walkthrough"},
  ],
  weekly: [
    {id:"w1",room:"Kitchen",task:"Deep clean counters, backsplash & appliances"},
    {id:"w2",room:"Kitchen",task:"Mop kitchen & dining floors"},
    {id:"w3",room:"Kitchen",task:"Wipe cabinet fronts & handles"},
    {id:"w4",room:"Bathrooms",task:"Scrub all toilets, sinks & showers/tubs"},
    {id:"w5",room:"Bathrooms",task:"Mop all bathroom floors"},
    {id:"w6",room:"Bathrooms",task:"Replace all towels & bath mats"},
    {id:"w7",room:"Bedrooms",task:"Change linens in all bedrooms"},
    {id:"w8",room:"Bedrooms",task:"Vacuum all bedroom floors & rugs"},
    {id:"w9",room:"Living",task:"Dust all surfaces, shelves & décor"},
    {id:"w10",room:"Living",task:"Vacuum sofas, chairs & rugs"},
    {id:"w11",room:"Entryway",task:"Sweep & mop entryway & hallways"},
    {id:"w12",room:"General",task:"Empty & reline all trash bins"},
    {id:"w13",room:"General",task:"Wipe door handles, light switches & railings"},
    {id:"w14",room:"General",task:"Vacuum all staircases"},
  ],
  monthly: [
    {id:"m1",room:"Kitchen",task:"Clean inside oven & range hood"},
    {id:"m2",room:"Kitchen",task:"Wipe out fridge & freezer interior"},
    {id:"m3",room:"Kitchen",task:"Clean behind & under appliances"},
    {id:"m4",room:"Bathrooms",task:"Descale all showerheads & faucets"},
    {id:"m5",room:"Bathrooms",task:"Wash shower curtains & liners"},
    {id:"m6",room:"Bathrooms",task:"Wipe down mirrors & cabinet interiors"},
    {id:"m7",room:"Bedrooms",task:"Flip or rotate all mattresses"},
    {id:"m8",room:"Bedrooms",task:"Dust ceiling fans, vents & light fixtures"},
    {id:"m9",room:"Living",task:"Wash windows & window sills (interior)"},
    {id:"m10",room:"Living",task:"Vacuum under & behind all furniture"},
    {id:"m11",room:"Entryway",task:"Wash entry mats & door frames"},
    {id:"m12",room:"General",task:"Wipe all baseboards throughout home"},
    {id:"m13",room:"General",task:"Clean inside all trash bins"},
    {id:"m14",room:"General",task:"Wash curtains, drapes or blinds"},
    {id:"m15",room:"General",task:"Wipe walls & spot-clean scuffs"},
  ],
};

const ROOMS = ["Kitchen","Bathrooms","Bedrooms","Living","Entryway","General"];
const COLORS = [
  {bg:"#dbeafe",text:"#1e40af",border:"#93c5fd",dot:"#3b82f6"},
  {bg:"#fce7f3",text:"#9d174d",border:"#f9a8d4",dot:"#ec4899"},
  {bg:"#d1fae5",text:"#065f46",border:"#6ee7b7",dot:"#10b981"},
  {bg:"#fef3c7",text:"#92400e",border:"#fcd34d",dot:"#f59e0b"},
  {bg:"#ede9fe",text:"#4c1d95",border:"#c4b5fd",dot:"#8b5cf6"},
];
const roomIcon = {Kitchen:"🍳",Bathrooms:"🚿",Bedrooms:"🛏️",Living:"🛋️",Entryway:"🚪",General:"🏠"};

let roomCode=null, myName=null, tab="daily", editMode=false;
let state={people:[],assignments:{},checked:{},customTasks:{}};
let roomRef=null, presenceRef=null, onlineUsers={};

function initials(n){return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function wordCode(){
  const adj=["BLUE","RED","GOLD","TEAL","LIME","ROSE","JADE","SAGE"];
  return adj[Math.floor(Math.random()*adj.length)]+"-"+(Math.floor(Math.random()*90)+10);
}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}
function copyRoomCode(){
  navigator.clipboard.writeText(roomCode).then(()=>showToast("Room code copied!")).catch(()=>showToast(roomCode));
}

function getTasks(){
  const custom=(state.customTasks&&state.customTasks[tab])||[];
  return [...DEFAULT_TASKS[tab],...custom];
}
function getHidden(){return(state.customTasks&&state.customTasks["hidden_"+tab])||[];}

async function createRoom(){
  const name=document.getElementById("create-name").value.trim();
  if(!name){document.getElementById("create-error").textContent="Please enter your name.";return;}
  document.getElementById("create-error").textContent="";
  const code=wordCode();
  await db.ref("rooms/"+code).set({people:[{id:1,name}],assignments:{},checked:{},customTasks:{},created:Date.now()});
  enterRoom(code,name);
}

async function joinRoom(){
  const name=document.getElementById("join-name").value.trim();
  const code=document.getElementById("join-code").value.trim().toUpperCase();
  if(!name){document.getElementById("join-error").textContent="Please enter your name.";return;}
  if(!code){document.getElementById("join-error").textContent="Please enter a room code.";return;}
  document.getElementById("join-error").textContent="Checking...";
  const snap=await db.ref("rooms/"+code).get();
  if(!snap.exists()){document.getElementById("join-error").textContent="Room not found. Check the code and try again.";return;}
  document.getElementById("join-error").textContent="";
  enterRoom(code,name);
}

function enterRoom(code,name){
  roomCode=code;myName=name;
  document.getElementById("room-screen").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("room-code-display").textContent=code;
  roomRef=db.ref("rooms/"+code);
  presenceRef=db.ref("rooms/"+code+"/online/"+name.replace(/\s/g,"_"));
  presenceRef.set(true);presenceRef.onDisconnect().remove();
  db.ref("rooms/"+code+"/online").on("value",snap=>{onlineUsers=snap.val()||{};renderOnline();});
  roomRef.on("value",snap=>{
    const data=snap.val();if(!data)return;
    state.people=data.people||[];
    state.assignments=data.assignments||{};
    state.checked=data.checked||{};
    state.customTasks=data.customTasks||{};
    render();
    document.getElementById("syncing-status").textContent="Synced just now";
    setTimeout(()=>{document.getElementById("syncing-status").textContent="";},2000);
  });
}

function renderOnline(){
  const names=Object.keys(onlineUsers).map(k=>k.replace(/_/g," "));
  const el=document.getElementById("online-display");
  if(!names.length){el.innerHTML="";return;}
  el.innerHTML=names.map((n,i)=>{
    const c=COLORS[i%COLORS.length];
    return `<div class="dot" style="background:${c.dot}" title="${n}"></div>`;
  }).join("")+`<span>${names.length} online</span>`;
}

function push(updates){if(roomRef)roomRef.update(updates);}

function setTab(t){
  tab=t;editMode=false;
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",["daily","weekly","monthly"][i]===t));
  document.getElementById("edit-toggle-btn").textContent="✏️ Edit tasks";
  render();
}

function toggleEditMode(){
  editMode=!editMode;
  document.getElementById("edit-toggle-btn").textContent=editMode?"✅ Done":"✏️ Edit tasks";
  render();
}

function addPerson(){
  const input=document.getElementById("new-person-input");
  const name=input.value.trim();if(!name)return;
  push({people:[...state.people,{id:Date.now(),name}]});
  input.value="";
}
function removePerson(pid){
  const newPeople=state.people.filter(p=>p.id!==pid);
  const newAssign={...state.assignments};
  Object.keys(newAssign).forEach(k=>{if(newAssign[k]===pid)delete newAssign[k];});
  push({people:newPeople,assignments:newAssign});
}
function autoSplit(){
  if(!state.people.length)return;
  const tasks=getTasks().filter(t=>!getHidden().includes(t.id));
  const newAssign={...state.assignments};
  tasks.forEach((t,i)=>{newAssign[t.id]=state.people[i%state.people.length].id;});
  push({assignments:newAssign});
}

function addCustomTask(){
  const input=document.getElementById("new-task-input");
  const sel=document.getElementById("new-task-room");
  const taskText=input.value.trim();if(!taskText)return;
  const newTask={id:"c"+Date.now(),room:sel.value,task:taskText};
  const existing=(state.customTasks&&state.customTasks[tab])||[];
  push({customTasks:{...(state.customTasks||{}),[tab]:[...existing,newTask]}});
  input.value="";
}

function deleteTask(taskId){
  const existing=(state.customTasks&&state.customTasks[tab])||[];
  const newAssign={...state.assignments};delete newAssign[taskId];
  const newChecked={...state.checked};delete newChecked[taskId];
  if(existing.find(t=>t.id===taskId)){
    push({customTasks:{...(state.customTasks||{}),[tab]:existing.filter(t=>t.id!==taskId)},assignments:newAssign,checked:newChecked});
  } else {
    const hiddenKey="hidden_"+tab;
    const hidden=getHidden();
    if(!hidden.includes(taskId)){
      push({customTasks:{...(state.customTasks||{}),[hiddenKey]:[...hidden,taskId]},assignments:newAssign,checked:newChecked});
    }
  }
}

function saveTaskEdit(taskId,newText,newRoom){
  const existing=(state.customTasks&&state.customTasks[tab])||[];
  const updated=existing.map(t=>t.id===taskId?{...t,task:newText||t.task,room:newRoom||t.room}:t);
  push({customTasks:{...(state.customTasks||{}),[tab]:updated}});
}

function restoreDefaults(){
  const hiddenKey="hidden_"+tab;
  const updated={...(state.customTasks||{})};
  delete updated[hiddenKey];
  push({customTasks:updated});
}

function assign(taskId,personId){
  const newAssign={...state.assignments};
  if(newAssign[taskId]===personId)delete newAssign[taskId];else newAssign[taskId]=personId;
  push({assignments:newAssign});
}
function toggleDone(taskId){
  const newChecked={...state.checked};
  newChecked[taskId]=!newChecked[taskId];
  push({checked:newChecked});
}
function clearTab(){
  const tasks=getTasks();
  const newAssign={...state.assignments};const newChecked={...state.checked};
  tasks.forEach(t=>{delete newAssign[t.id];delete newChecked[t.id];});
  push({assignments:newAssign,checked:newChecked});
}

function render(){
  const allTasks=getTasks();
  const hidden=getHidden();
  const tasks=allTasks.filter(t=>!hidden.includes(t.id));

  // People
  document.getElementById("people-wrap").innerHTML=state.people.map((p,idx)=>{
    const c=COLORS[idx%COLORS.length];
    return `<div class="person-pill" style="background:${c.bg};border:1px solid ${c.border}">
      <div class="person-avatar" style="background:${c.dot}">${initials(p.name)}</div>
      <span style="font-size:13px;color:${c.text}">${p.name}</span>
      <button class="remove-btn" style="color:${c.text}" onclick="removePerson(${p.id})">×</button>
    </div>`;
  }).join("");

  // Task editor
  const editorEl=document.getElementById("task-editor");
  if(editMode){
    const hiddenCount=hidden.length;
    editorEl.innerHTML=`<div class="task-list-edit">`+tasks.map(t=>{
      const isCustom=t.id.startsWith("c");
      return `<div class="task-edit-row">
        <span class="room-icon">${roomIcon[t.room]}</span>
        ${isCustom
          ? `<input value="${t.task.replace(/"/g,'&quot;')}"
               onblur="saveTaskEdit('${t.id}',this.value,this.parentElement.querySelector('select').value)"
               onkeydown="if(event.key==='Enter')this.blur()" />
             <select onchange="saveTaskEdit('${t.id}',this.previousElementSibling.value,this.value)">
               ${ROOMS.map(r=>`<option ${r===t.room?'selected':''}>${r}</option>`).join('')}
             </select>`
          : `<span class="static-task-label">${t.task} <span style="font-size:11px;color:#9ca3af">(${t.room})</span></span>`
        }
        <button class="del-btn" onclick="deleteTask('${t.id}')" title="${isCustom?'Delete':'Hide'}">🗑</button>
      </div>`;
    }).join("")+`</div>`
    +(hiddenCount>0?`<button class="btn-sm" style="margin-bottom:10px" onclick="restoreDefaults()">↩ Restore ${hiddenCount} hidden task${hiddenCount>1?'s':''}</button>`:'')
    +`<div class="add-row">
        <input id="new-task-input" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addCustomTask()" />
        <select id="new-task-room">${ROOMS.map(r=>`<option>${r}</option>`).join("")}</select>
        <button class="btn btn-dark" onclick="addCustomTask()">Add</button>
      </div>`;
  } else {
    editorEl.innerHTML="";
  }

  // Stats
  const assigned=tasks.filter(t=>state.assignments[t.id]).length;
  const done=tasks.filter(t=>state.checked[t.id]).length;
  document.getElementById("stat-total").textContent=tasks.length;
  document.getElementById("stat-assigned").textContent=assigned;
  document.getElementById("stat-done").textContent=done;

  // Columns
  const cols=document.getElementById("columns");
  const colNum=Math.max(1,Math.min(state.people.length,window.innerWidth<500?2:3));
  cols.style.gridTemplateColumns=state.people.length===0?"1fr":`repeat(${colNum},1fr)`;
  cols.innerHTML=state.people.map((person,idx)=>{
    const c=COLORS[idx%COLORS.length];
    const ptasks=tasks.filter(t=>state.assignments[t.id]===person.id);
    const doneCnt=ptasks.filter(t=>state.checked[t.id]).length;
    const taskRows=ptasks.length===0
      ?`<div class="empty-col">No tasks yet</div>`
      :ptasks.map(t=>{
        const isDone=!!state.checked[t.id];
        return `<div class="task-item ${isDone?'done':''}" onclick="toggleDone('${t.id}')">
          <div class="checkbox ${isDone?'checked':''}" style="${isDone?`background:${c.dot}`:''}">
            <svg class="check-inner" width="9" height="9" viewBox="0 0 10 10" fill="none">
              <path d="M2 5l2.5 2.5L8 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <div class="task-text ${isDone?'task-done-text':''}">${t.task}</div>
            <div class="task-room">${roomIcon[t.room]} ${t.room}</div>
          </div>
        </div>`;
      }).join("");
    return `<div class="person-col" style="border-color:${c.border}">
      <div class="col-header" style="background:${c.bg};border-bottom-color:${c.border}">
        <div class="col-avatar" style="background:${c.dot}">${initials(person.name)}</div>
        <div>
          <div class="col-name" style="color:${c.text}">${person.name}</div>
          <div class="col-progress" style="color:${c.text}">${doneCnt}/${ptasks.length} done</div>
        </div>
      </div>
      <div class="col-body">${taskRows}</div>
    </div>`;
  }).join("");

  // Unassigned
  const unassigned=tasks.filter(t=>!state.assignments[t.id]);
  const usec=document.getElementById("unassigned-section");
  if(!unassigned.length){usec.innerHTML="";return;}
  usec.innerHTML=`<div class="unassigned-section">
    <div class="unassigned-header">Unassigned — ${unassigned.length} task${unassigned.length!==1?'s':''}</div>
    ${unassigned.map(t=>`
      <div class="unassigned-item">
        <div class="unassigned-task">${roomIcon[t.room]} <strong>${t.room}</strong> · ${t.task}</div>
        <div class="assign-btns">
          ${state.people.map((p,idx)=>{
            const c=COLORS[idx%COLORS.length];
            return `<button class="assign-btn" style="background:${c.bg};border-color:${c.border};color:${c.text}" onclick="assign('${t.id}',${p.id})">+ ${p.name}</button>`;
          }).join("")}
        </div>
      </div>`).join("")}
  </div>`;
}
</script>
</body>
</html>
